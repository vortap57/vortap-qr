services:
  - type: web
    name: vortap-qr
    runtime: node
    plan: starter
    buildCommand: "true"
    startCommand: "node server.mjs"
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: NODE_VERSION
        value: 22.22.0
      - key: CORS_ORIGIN
        value: "*"
    disk:
      name: vortap-data
      mountPath: /var/data
      sizeGB: 1
